<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Picture Grid Quest</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="topbar" aria-label="Game status">
        <button class="icon-button" id="newPuzzleButton" type="button" title="New puzzle" aria-label="New puzzle">
          <span aria-hidden="true">↻</span>
        </button>
        <div class="level-status">
          <span class="label">Level</span>
          <strong id="levelNumber">1</strong>
        </div>
        <div class="level-status">
          <span class="label">Grid</span>
          <strong id="gridSize">4x4</strong>
        </div>
        <button class="icon-button" id="hintButton" type="button" title="Preview" aria-label="Preview completed picture">
          <span aria-hidden="true">▣</span>
        </button>
      </section>

      <section class="stage">
        <div class="board-shell">
          <div class="board" id="board" aria-label="Picture puzzle board"></div>
          <div class="preview" id="preview" aria-hidden="true">
            <img id="previewImage" alt="">
          </div>
        </div>

        <aside class="panel" aria-label="Puzzle controls">
          <div class="progress-box">
            <span class="label">Completions to next grid</span>
            <strong id="progressText">0 / 3</strong>
            <div class="progress-track" aria-hidden="true">
              <span id="progressFill"></span>
            </div>
          </div>

          <div class="stats">
            <div>
              <span class="label">Moves</span>
              <strong id="moveCount">0</strong>
            </div>
            <div>
              <span class="label">Pictures</span>
              <strong id="pictureCount">6</strong>
            </div>
          </div>

          <label class="upload">
            <input id="photoInput" type="file" accept="image/*" multiple>
            <span>Add Photos</span>
          </label>

          <div class="gallery" id="gallery" aria-label="Picture choices"></div>

          <p class="rules">
            Swap two squares to rebuild the picture. A 4x4 grid needs 3 completed pictures, a 5x5 needs 4, and each new grid follows the same pattern.
          </p>
        </aside>
      </section>

      <dialog id="winDialog">
        <form method="dialog" class="dialog-card">
          <strong>Puzzle complete</strong>
          <span id="winText">Nice work.</span>
          <button class="primary" value="next">Next Picture</button>
        </form>
      </dialog>
    </main>

    <script src="game.js"></script>
  </body>
</html>
